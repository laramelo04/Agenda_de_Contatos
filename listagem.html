<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="listagem.css">
    <title>Lista de contatos</title>
</head>
<body>
    <section class="container">
        <header id="menu">
            <img src="SchoolConnect.png" id="logo">
            <nav id="navegacao">
                <a href="home.html">Home</a>
                <br>
                <a href="listagem.html">Contatos</a>
                <br>
            </nav>  
        </header>

        <main id="principal">
            <a href="cadastro.html"><button id="novoContato">+ Novo contato</button></a>
            <div class="cadastro">
                <header id="parte1">
                    <div id="busca">
                        <span class="lupa">⌕</span>
                        <input type="text" placeholder="Buscar contato..." id="buscar">
                    </div>
                </header>
                <div id="dados">
                    <table  id="tabela">
                        <tr>
                            <th>Foto</th>
                            <th>Nome</th>
                            <th>Curso</th>
                            <th>Telefone</th>
                            <th>E-mail</th>
                            <th>Ações</th>
                        </tr>
                        <tr></tr>
                    </table>
                </div>
            </div>
        </main>
    </section>
</body>
<script src="listagem.js"></script>
</html>
