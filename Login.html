<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <section class="container">
        <main id="principal">
            <div class="cadastro">
                <header id="parte1">
                    <h1 class="titulo" id="h1">Login</h1>
                    <p class="titulo" id="p">Entre com seus dados para acessar o sistema</p>
                </header>
                <div id="dados">
                    <form id="formLogin">
                        <div class="campo">
                            <p>E-mail</p>
                            <input type="email" id="email" required>
                        </div>
                        <div class="campo">
                            <p>Senha</p>
                            <input type="password" id="senha" required>
                        </div>
                        <div class="campo">
                            <button type="button" id="btnLogin">Entrar</button>
                        </div>
                        <div class="campo">
                            <button type="button" id="btnCadastro">Cadastrar usuário</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </section>
</body>
<script src="Login.js"></script>

</html>
